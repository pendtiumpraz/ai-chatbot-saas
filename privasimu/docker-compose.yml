version: '3.8'

services:
  # =============================================
  # MySQL Database
  # =============================================
  db:
    image: mysql:8.0
    container_name: privasimu-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-privasimu_root}
      MYSQL_DATABASE: ${DB_DATABASE:-privasimu}
      MYSQL_USER: ${DB_USERNAME:-privasimu}
      MYSQL_PASSWORD: ${DB_PASSWORD:-privasimu_secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis (Cache & Queue)
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: privasimu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # =============================================
  # Laravel Backend API
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: privasimu-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_NAME: Privasimu
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-privasimu}
      DB_USERNAME: ${DB_USERNAME:-privasimu}
      DB_PASSWORD: ${DB_PASSWORD:-privasimu_secret}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_SEEDERS: "true"
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/var/www/html/storage

  # =============================================
  # Next.js Frontend
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: privasimu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"

  # =============================================
  # Nginx Reverse Proxy
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: privasimu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  redis_data:
  backend_storage:
