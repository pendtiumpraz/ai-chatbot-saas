server {
    listen 80;
    server_name localhost;

    # Frontend Reverse Proxy
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API Reverse Proxy
    location /api {
        proxy_pass http://backend:8000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout headers for long scanning requests
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # Static assets for backend (Consent SDK, images)
    location ~* \.(js|css|gif|jpe?g|png|woff2?|eot|ttf|svg|ico)$ {
        # First try frontend, if missing try backend
        proxy_pass http://frontend:3000;
        proxy_intercept_errors on;
        error_page 404 = @backend_static;
    }

    location @backend_static {
        proxy_pass http://backend:8000;
    }
}
